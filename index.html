<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
  <meta name="description" content="Mapa interactivo de fuentes de agua potable: OpenStreetMap en todo el mundo y datos oficiales verificados donde existen." />
  <meta name="theme-color" content="#0085c7" />
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/icons/icon-192.png" type="image/png" sizes="192x192" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-title" content="Fuentes" />
  <title>Fuentes de agua potable</title>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Mapa a pantalla completa -->
  <div id="map" role="application" aria-label="Mapa de fuentes de agua potable"></div>

  <!-- Buscador de zonas (glass): el elemento principal, arriba en el centro -->
  <div class="search" id="search">
    <div class="search__box glass">
      <svg class="search__icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.2" y2="16.2"></line>
      </svg>
      <!-- Spinner de carga: sustituye a la lupa mientras se traen fuentes -->
      <span class="search__spinner" aria-hidden="true"></span>
      <input id="search-input" class="search__input" type="search"
             placeholder="Buscar ciudad o zona…" autocomplete="off"
             spellcheck="false" role="combobox" aria-expanded="false"
             aria-controls="search-listbox" aria-autocomplete="list"
             aria-label="Buscar ciudad o zona" />
      <button type="button" class="search__clear" id="search-clear"
              aria-label="Borrar búsqueda" hidden>&times;</button>
    </div>
    <ul class="search__results glass" id="search-listbox" role="listbox"
        aria-label="Sugerencias" hidden></ul>
  </div>

  <!-- "Buscar en esta zona": aparece bajo el buscador al arrastrar el mapa a
       una zona nueva. Deja que el usuario decida cuándo cargar sus fuentes. -->
  <button type="button" class="search-here glass" id="search-here" hidden>
    <svg class="search-here__icon" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
         stroke-linejoin="round" aria-hidden="true">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    <span class="search-here__label">Buscar en esta zona</span>
  </button>

  <!-- Fila secundaria bajo el buscador: filtros + contador (compactos) -->
  <div class="toolbar">
  <div class="filter-menu" id="filter-menu">
    <button type="button" class="filter-toggle glass" id="filter-toggle"
            aria-expanded="false" aria-controls="filter-popover"
            aria-label="Filtrar por estado">
      <svg class="filter-toggle__icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
      <span class="filter-toggle__label">Filtros</span>
      <span class="filter-toggle__badge" id="filter-badge" hidden></span>
    </button>

    <div class="filter-popover glass" id="filter-popover" role="group"
         aria-label="Filtrar por estado">
      <button type="button" class="filter-opt is-active" data-cat="ok">
        <span class="chip__dot chip__dot--ok"></span>
        <span class="filter-opt__label">Operativas</span>
        <span class="filter-opt__check" aria-hidden="true">✓</span>
      </button>
      <button type="button" class="filter-opt is-active" data-cat="warn">
        <span class="chip__dot chip__dot--warn"></span>
        <span class="filter-opt__label">Cerradas</span>
        <span class="filter-opt__check" aria-hidden="true">✓</span>
      </button>
      <button type="button" class="filter-opt is-active" data-cat="off">
        <span class="chip__dot chip__dot--off"></span>
        <span class="filter-opt__label">Fuera de servicio</span>
        <span class="filter-opt__check" aria-hidden="true">✓</span>
      </button>
    </div>
  </div>

  <span class="count glass" id="count" hidden></span>
  </div>

  <!-- Mensajes transitorios -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Botón "Cerca de mí" -->
  <button type="button" id="locate-btn" class="fab glass" title="Buscar fuentes cerca de mí" aria-label="Buscar fuentes cerca de mí">
    <span class="fab__icon" aria-hidden="true">📍</span>
    <span class="fab__label">Cerca de mí</span>
  </button>

  <!-- Panel de detalle (bottom sheet, glass) -->
  <aside id="sheet" class="sheet glass" aria-label="Detalle de la fuente" hidden>
    <button type="button" id="sheet-close" class="sheet__close" aria-label="Cerrar">&times;</button>
    <div class="sheet__handle" aria-hidden="true"></div>
    <div id="sheet-body"></div>
  </aside>

  <!-- Aplicación (Vite bundlea JS y CSS de MapLibre) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
